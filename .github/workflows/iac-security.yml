name: IaC Security
 
# Garde-fous de sécurité statique. Conçu pour passer au VERT sur un socle encore vide,
# puis devenir bloquant au fur et à mesure que tu ajoutes de vraies ressources.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
permissions:
  contents: read
 
jobs:
  scan:
    name: Static security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historique complet, utile au scan de secrets
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
 
      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive
 
      - name: Install security tools
        run: |
          pip install checkov
          GITLEAKS_VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          CONFTEST_VERSION=0.57.0
          curl -sSfL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin conftest
 
      - name: Checkov (IaC misconfig)
        # Gate bloquant : une misconfig critique fait échouer la PR.
        run: checkov -d terraform --quiet
 
      - name: Gitleaks (secret scanning)
        # binaire direct = pas de rapport SARIF à écrire, donc plus d'erreur "permission denied"
        run: gitleaks dir . --redact
 
      - name: Conftest (policy-as-code / OPA)
        run: conftest test terraform --policy policies/opa
 