name: IaC Security
 
# Garde-fous de sécurité statique. Conçu pour passer au VERT sur un socle encore vide,
# puis devenir bloquant au fur et à mesure que tu ajoutes de vraies ressources.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
permissions:
  contents: read
 
jobs:
  scan:
    name: Static security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historique complet, utile au scan de secrets
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
 
      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive
 
      - name: Install security tools
        # pip + brew = versions toujours à jour, aucune URL fragile, aucune Action capricieuse
        run: |
          pip install checkov
          brew install gitleaks conftest
 
      - name: Checkov (IaC misconfig)
        # --soft-fail tant que le socle est vide.
        # Quand tu auras de vraies ressources : retire --soft-fail pour rendre le gate BLOQUANT.
        run: checkov -d terraform --soft-fail --quiet
 
      - name: Gitleaks (secret scanning)
        # binaire direct = pas de rapport SARIF à écrire, donc plus d'erreur "permission denied"
        run: gitleaks dir . --redact
 
      - name: Conftest (policy-as-code / OPA)
        run: conftest test terraform --policy policies/opa
 