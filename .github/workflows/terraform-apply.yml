name: Terraform apply

on:
  push:          # se déclenche lors des push sur main, pour que le plan soit toujours à jour
    branches: [main]

permissions:
  contents: read
  id-token: write        # pour l'OIDC
  
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod          # ← c'est ce qui déclenche l'approbation manuelle

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-3

      - name: Terraform Init
        run: terraform -chdir=terraform init

      # --- DÉBLOCAGE TEMPORAIRE (-refresh=false) ---
      # Pourquoi : la policy IAM actuellement attachée au rôle github-actions-role-prod (sur le vrai AWS) date
      # d'un déploiement raté avant nos corrections de permissions. Un `plan`/`apply` normal commence par un
      # "refresh" qui relit l'état réel de TOUTES les ressources sur AWS avec CETTE policy insuffisante — ce
      # refresh échoue donc systématiquement, avant même d'atteindre l'étape qui appliquerait la policy corrigée.
      # C'est un verrou circulaire : impossible d'appliquer le correctif car appliquer le correctif nécessite
      # des permissions que seul le correctif donnerait.
      # `-refresh=false` fait calculer le plan à partir du dernier state connu (sans revérifier AWS), ce qui
      # permet de pousser uniquement la mise à jour de la policy IAM sans passer par la lecture bloquante.
      # À FAIRE UNE FOIS LE DÉPLOIEMENT PASSÉ : retirer `-refresh=false` des deux lignes ci-dessous et repousser,
      # pour que les prochains déploiements refassent un vrai refresh (comportement normal et plus sûr).
      - name: Terraform Plan
        run: terraform -chdir=terraform plan -refresh=false -no-color -var="environment=prod" -var="github_org=JoelF29" -var="github_repo=Secure-Landing-Zone" -var="vpc_cidr=10.20.0.0/20"

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -refresh=false -auto-approve -var="environment=prod" -var="github_org=JoelF29" -var="github_repo=Secure-Landing-Zone" -var="vpc_cidr=10.20.0.0/20"
