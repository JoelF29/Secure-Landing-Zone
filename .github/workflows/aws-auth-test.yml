name: AWS OIDC Auth Test

on:
  push:
    branches: [main]

jobs:
  oidc-auth-test:
    name: Verify keyless AWS authentication
    runs-on: ubuntu-latest
    # "environment: prod" ajouté pour deux raisons :
    # 1. Si le secret AWS_ROLE_ARN est un secret d'environnement (pas de repo), seuls les jobs qui déclarent
    #    cet environnement peuvent le lire — sans ça, ce job recevait potentiellement une valeur vide.
    # 2. Ça aligne le format du "sub claim" OIDC émis par GitHub avec celui attendu par la trust policy IAM
    #    (repo:org/repo:environment:prod), cohérent avec terraform-apply.yml.
    environment: prod

    permissions:
      contents: read
      id-token: write   # valeur qui permet à GitHub d'émettre le jeton OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}   # nom du secret GitHub qui contient l'ARN du rôle
          aws-region: eu-west-3

      - name: Verify assumed identity
        run: aws sts get-caller-identity   # la commande AWS qui affiche l'identité assumée
